<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One participants own page</title>
    <link rel="stylesheet" href="../css/oneParticipantsPage.css">
</head>

<body>
    <!-- NAVBAR -->

                        <p><strong>Element:</strong><span id="element"></span></p>
                        <p><strong>Color:</strong><span id="color"></span></p>
                        <p><strong>Quality:</strong><span id="quality"></span></p>
                        <p><strong>Day:</strong><span id="day"></span></p>
                        <p><strong>Greatest Compatibility:</strong><span id="compatibility"></span></p>
                        <p><strong>Lucky Numbers:</strong><span id="luckyNumbers"></span></p>
                        <p><strong>Ruler:</strong><span id="ruler"></span></p>
                        <p><strong>Dates:</strong><span id="dates"></span></p>
                    </section>

                </div>
                <p class="participantText" id="thisParticipantText"></p>
            </div>
        </div>
        <div class="sectionRight">
            <img id="bigWaterPlanetImg" src="../assets/planetsImg/waterPlanet.png" alt="Big blue planet called Aquorim">

    <script src="../database/dataset.v2.js"></script>
